<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --yellow:#FFD400; --black:#141414; --ink:#1f1f1f; --paper:#f6f5f1;
  --card:#ffffff; --line:#e3e1da; --muted:#7a776e; --green:#1a7f37;
  --red:#b42318; --redbg:#fdecea; --greenbg:#e6f4ea; --amber:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);font-size:15px}
.hazard{background:repeating-linear-gradient(45deg,var(--yellow) 0 14px,var(--black) 14px 28px);height:8px}
header{background:var(--black);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-family:'Saira Condensed',sans-serif;font-size:26px;letter-spacing:1px;text-transform:uppercase}
header h1 span{color:var(--yellow)}
header .sub{color:#bbb;font-size:12px}
nav{display:flex;gap:4px;background:var(--black);padding:0 10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{font-family:'Saira Condensed',sans-serif;font-size:15px;letter-spacing:.5px;text-transform:uppercase;
  background:#2a2a2a;color:#ddd;border:none;padding:9px 16px;cursor:pointer;white-space:nowrap;border-radius:3px}
nav button.active{background:var(--yellow);color:var(--black);font-weight:700}
main{max-width:1080px;margin:0 auto;padding:18px 14px 60px}
h2{font-family:'Saira Condensed',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:.5px;margin:6px 0 14px;
  border-left:6px solid var(--yellow);padding-left:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px}
.kpi .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.kpi .val{font-family:'Saira Condensed',sans-serif;font-size:30px;font-weight:700;font-variant-numeric:tabular-nums}
.kpi .note{font-size:12px;color:var(--muted);margin-top:2px}
.kpi.warn .val{color:var(--red)}
.kpi.good .val{color:var(--green)}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#fff;background:var(--black);padding:8px 9px;text-align:left}
td{padding:8px 9px;border-bottom:1px solid var(--line);font-size:14px}
td.num,th.num{text-align:right}
tr:hover td{background:#faf9f5}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.tag.ok{background:var(--greenbg);color:var(--green)}
.tag.bad{background:var(--redbg);color:var(--red)}
.tag.warn{background:#fef3e2;color:var(--amber)}
form.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
input,select{width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:5px;font-size:15px;font-family:'Inter',sans-serif;background:#fff}
input:focus,select:focus{outline:2px solid var(--yellow);border-color:var(--black)}
button.btn{font-family:'Saira Condensed',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;
  background:var(--yellow);color:var(--black);border:2px solid var(--black);border-radius:5px;padding:10px 22px;cursor:pointer}
button.btn:active{transform:translateY(1px)}
button.mini{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px}
.autoline{font-size:13px;color:var(--muted);background:#fbf8ec;border:1px dashed #d8c66a;border-radius:5px;padding:8px 10px;margin-top:10px}
.balpos{color:var(--green)} .balneg{color:var(--red)}
.chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 4px 0}
.bar{flex:1;background:var(--yellow);border:2px solid var(--black);border-bottom:none;position:relative;min-width:26px;border-radius:3px 3px 0 0}
.bar .v{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:11px;font-weight:700}
.bar .m{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}
.chartwrap{padding-bottom:26px;overflow-x:auto}
.msg{padding:10px 12px;border-radius:6px;margin:10px 0;font-size:14px;display:none}
.msg.ok{background:var(--greenbg);color:var(--green);display:block}
.msg.err{background:var(--redbg);color:var(--red);display:block}
#gate{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:50}
#gate .box{background:var(--card);border-radius:10px;padding:30px;text-align:center;width:300px}
#gate h1{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;margin-bottom:4px}
#gate input{text-align:center;font-size:22px;letter-spacing:6px;margin:14px 0}
.scroll{overflow-x:auto}
@media(max-width:600px){ .kpi .val{font-size:24px} main{padding:12px 8px 60px} td,th{padding:7px 6px;font-size:13px} }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="hazard" style="margin-bottom:14px"></div>
    <h1>Factory <span style="color:#b8860b">Manager</span></h1>
    <p style="font-size:13px;color:#888">Enter PIN</p>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" autofocus>
    <button class="btn" onclick="checkPin()">Enter</button>
    <p id="pinerr" style="color:var(--red);font-size:13px;margin-top:8px"></p>
  </div>
</div>

<div class="hazard"></div>
<header>
  <h1>Factory <span>Manager</span></h1>
  <div class="sub">Glove factory &middot; BLINE group</div>
</header>
<nav id="nav"></nav>

<main id="main"><div class="card">Loading&hellip;</div></main>

<script>
/* ================= CONFIG - EDIT THESE 3 LINES ================= */
const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL_HERE";
const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";
const APP_PIN = "2026";
/* =============================================================== */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const CASH_CATS = ["From BLINE","To BLINE","Wages","Electricity","Rent","Transport","Maintenance","Other"];
const OH_COLS = ["wages","electricity","rent","transport","maintenance","other"];

let D = { products:[], materials:[], purchases:[], production:[], sales:[], cash:[], overheads:[], settings:{} };
let currentTab = "dashboard";

/* ---------- PIN gate ---------- */
function checkPin(){
  if(document.getElementById('pin').value === APP_PIN){
    document.getElementById('gate').style.display='none';
    try{ localStorage.setItem('fm_pin_ok','1'); }catch(e){}
  } else document.getElementById('pinerr').textContent = 'Wrong PIN';
}
document.getElementById('pin').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPin(); });
try{ if(localStorage.getItem('fm_pin_ok')==='1') document.getElementById('gate').style.display='none'; }catch(e){}

/* ---------- helpers ---------- */
const fmt = n => (n==null||isNaN(n)) ? "-" : Number(n).toLocaleString('en-LK',{maximumFractionDigits:0});
const fmt2 = n => (n==null||isNaN(n)) ? "-" : Number(n).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const monthKey = d => d.slice(0,7);
const monthLabel = k => new Date(k+"-01T00:00:00").toLocaleString('en',{month:'short',year:'2-digit'});
const S = k => Number(D.settings[k] ?? 0);
const esc = s => (s??"").toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function loadAll(){
  const [p,m,pu,pl,sa,cb,oh,st] = await Promise.all([
    sb.from('products').select('*').order('name'),
    sb.from('materials').select('*').order('id'),
    sb.from('purchases').select('*').order('date'),
    sb.from('production_log').select('*').order('date'),
    sb.from('sales').select('*').order('date'),
    sb.from('cash_book').select('*').order('date'),
    sb.from('overheads').select('*').order('month'),
    sb.from('settings').select('*')
  ]);
  const err = [p,m,pu,pl,sa,cb,oh,st].find(r=>r.error);
  if(err){ document.getElementById('main').innerHTML = `<div class="card" style="color:var(--red)">Database error: ${esc(err.error.message)}<br><br>Check the SUPABASE_URL and key at the top of index.html, and that supabase_setup.sql was run.</div>`; throw err.error; }
  D.products=p.data; D.materials=m.data; D.purchases=pu.data; D.production=pl.data;
  D.sales=sa.data; D.cash=cb.data; D.overheads=oh.data;
  D.settings = Object.fromEntries(st.data.map(r=>[r.key, r.value]));
}

/* ---------- computations (mirrors the Excel workbook) ---------- */
function matName(id){ const m=D.materials.find(x=>x.id===id); return m?m.name:"?"; }
function prodName(id){ const p=D.products.find(x=>x.id===id); return p?p.name:"?"; }

function bagUse(pcs){ return { poly: pcs/S('gloves_per_poly'), pora: pcs/S('gloves_per_pora') }; }

function materialUsage(rows){
  const u = {}; D.materials.forEach(m=>u[m.name]=0);
  rows.forEach(r=>{
    u["White Yarn"] += Number(r.white_yarn||0);
    u["Blue Yarn"] += Number(r.blue_yarn||0);
    u["Rubber Roll"] += Number(r.rubber_rolls||0);
    const b = bagUse(Number(r.pcs||0));
    u["Polythene Bags"] += b.poly; u["Pora Bags"] += b.pora;
  });
  return u;
}

function materialStats(){
  const used = materialUsage(D.production);
  return D.materials.map(m=>{
    const pur = D.purchases.filter(p=>p.material_id===m.id);
    const qty = pur.reduce((s,p)=>s+Number(p.qty),0);
    const spend = pur.reduce((s,p)=>s+Number(p.qty)*Number(p.unit_price),0);
    const avg = qty? spend/qty : 0;
    const u = used[m.name]||0;
    return { ...m, purchased:qty, spend, avg, used:u, stock: qty-u };
  });
}

function finishedStock(){
  return D.products.map(p=>{
    const made = D.production.filter(r=>r.product_id===p.id).reduce((s,r)=>s+Number(r.pcs),0);
    const sold = D.sales.filter(r=>r.product_id===p.id).reduce((s,r)=>s+Number(r.pcs),0);
    return { ...p, made, sold, stock: made-sold };
  });
}

function monthlyCosting(){
  const mats = materialStats();
  const avgOf = n => (mats.find(m=>m.name===n)||{}).avg||0;
  const months = {};
  D.production.forEach(r=>{
    const k = monthKey(r.date);
    months[k] = months[k] || { month:k, white:0, blue:0, rubber:0, poly:0, pora:0, pcs:0 };
    const M = months[k];
    M.white+=Number(r.white_yarn||0); M.blue+=Number(r.blue_yarn||0); M.rubber+=Number(r.rubber_rolls||0);
    const b=bagUse(Number(r.pcs||0)); M.poly+=b.poly; M.pora+=b.pora; M.pcs+=Number(r.pcs||0);
  });
  return Object.values(months).sort((a,b)=>a.month.localeCompare(b.month)).map(M=>{
    const matCost = M.white*avgOf("White Yarn") + M.blue*avgOf("Blue Yarn") + M.rubber*avgOf("Rubber Roll")
                  + M.poly*avgOf("Polythene Bags") + M.pora*avgOf("Pora Bags");
    const oh = D.overheads.find(o=>monthKey(o.month)===M.month);
    const ohTotal = oh? OH_COLS.reduce((s,c)=>s+Number(oh[c]||0),0) : 0;
    const total = matCost + ohTotal;
    return { ...M, matCost, ohTotal, total, costPc: M.pcs? total/M.pcs : null, yarnPc: M.pcs? (M.white+M.blue)/M.pcs : null };
  });
}

function pricing(){
  const mc = monthlyCosting().filter(m=>m.costPc!=null);
  const latest = mc.length? mc[mc.length-1].costPc : null;
  const avg = mc.length? mc.reduce((s,m)=>s+m.costPc,0)/mc.length : null;
  const margin = S('target_margin');
  const minPrice = (avg!=null && margin<1)? avg/(1-margin) : null;
  return { latest, avg, margin, minPrice };
}

function statement(){
  const rows = [];
  D.purchases.forEach(p=>rows.push({date:p.date, ts:p.created_at, desc:`${matName(p.material_id)} x ${p.qty}`, type:"Materials taken", amt:Number(p.qty)*Number(p.unit_price), side:-1}));
  D.sales.forEach(s=>rows.push({date:s.date, ts:s.created_at, desc:`${prodName(s.product_id)} ${fmt(s.pcs)} pcs`, type:"Gloves delivered", amt:Number(s.pcs)*Number(s.price_per_pc), side:+1}));
  D.cash.forEach(c=>{
    if(c.category==="From BLINE") rows.push({date:c.date, ts:c.created_at, desc:c.description, type:"Payment received", amt:Number(c.money_in||0), side:-1});
    if(c.category==="To BLINE")   rows.push({date:c.date, ts:c.created_at, desc:c.description, type:"Payment made", amt:Number(c.money_out||0), side:+1});
  });
  rows.sort((a,b)=> a.date.localeCompare(b.date) || (a.ts||"").localeCompare(b.ts||""));
  let bal=0; rows.forEach(r=>{ bal += r.side*r.amt; r.bal=bal; });
  return { rows, balance:bal };
}

function cashBalance(){ return D.cash.reduce((s,c)=>s+Number(c.money_in||0)-Number(c.money_out||0),0); }

function daysLeft(){
  const cutoff = new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  const recent = D.production.filter(r=>r.date>=cutoff);
  const use30 = materialUsage(recent);
  return materialStats().map(m=>{
    const daily = (use30[m.name]||0)/30;
    const days = daily>0 ? m.stock/daily : null;
    let status = "NO RECENT USE";
    if(daily>0) status = m.stock<=0 ? "OUT OF STOCK" : (days<=S('lead_time_days') ? "REORDER NOW" : "OK");
    return { ...m, daily, days, status };
  });
}

/* ---------- rendering ---------- */
const TABS = [
  ["dashboard","Dashboard"],["production","Daily Production"],["purchases","Purchases"],
  ["sales","Deliveries"],["cash","Cash Book"],["overheads","Overheads"],
  ["statement","BLINE Statement"],["costing","Costing"],["stocks","Stocks"]
];

function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(([id,l])=>
    `<button class="${id===currentTab?'active':''}" onclick="go('${id}')">${l}</button>`).join('');
}
function go(tab){ currentTab=tab; renderNav(); render(); }

function render(){
  const el = document.getElementById('main');
  const R = { dashboard, production:productionScreen, purchases:purchasesScreen, sales:salesScreen,
              cash:cashScreen, overheads:overheadsScreen, statement:statementScreen,
              costing:costingScreen, stocks:stocksScreen };
  el.innerHTML = R[currentTab]();
}

function dashboard(){
  const cash = cashBalance();
  const fs = finishedStock().reduce((s,p)=>s+p.stock,0);
  const pr = pricing();
  const st = statement();
  const dl = daysLeft().filter(m=>m.name);
  const mc = monthlyCosting();
  const maxPcs = Math.max(1,...mc.map(m=>m.pcs));
  return `
  <div class="kpis">
    <div class="kpi ${cash<0?'warn':''}"><div class="lbl">Cash balance</div><div class="val">Rs ${fmt(cash)}</div></div>
    <div class="kpi"><div class="lbl">Finished stock</div><div class="val">${fmt(fs)} pcs</div>
      <div class="note">${pr.avg!=null? "value ~ Rs "+fmt(fs*pr.avg):""}</div></div>
    <div class="kpi ${st.balance<0?'warn':'good'}"><div class="lbl">BLINE position</div><div class="val">Rs ${fmt(Math.abs(st.balance))}</div>
      <div class="note">${st.balance===0?"Settled":st.balance>0?"BLINE owes factory":"Factory owes BLINE"}</div></div>
    <div class="kpi"><div class="lbl">Min selling price</div><div class="val">${pr.minPrice!=null?"Rs "+fmt2(pr.minPrice):"-"}</div>
      <div class="note">per pc at ${(pr.margin*100).toFixed(0)}% margin</div></div>
  </div>

  <div class="card">
    <h2>Raw materials - days left</h2>
    <div class="scroll"><table>
      <tr><th>Material</th><th class="num">Stock</th><th class="num">Daily use (30d)</th><th class="num">Days left</th><th>Status</th></tr>
      ${dl.map(m=>`<tr><td>${esc(m.name)}</td><td class="num">${fmt2(m.stock)} ${m.unit}</td>
        <td class="num">${fmt2(m.daily)}</td><td class="num">${m.days!=null?Math.round(m.days):"-"}</td>
        <td><span class="tag ${m.status==='OK'?'ok':m.status==='NO RECENT USE'?'warn':'bad'}">${m.status}</span></td></tr>`).join('')}
    </table></div>
    <div class="autoline">Reorder flag fires when days left &le; ${S('lead_time_days')} days (lead time, set in Settings table).</div>
  </div>

  <div class="card">
    <h2>Production by month (pcs)</h2>
    ${mc.length? `<div class="chartwrap"><div class="chart">
      ${mc.map(m=>`<div class="bar" style="height:${Math.max(6,m.pcs/maxPcs*100)}%"><div class="v">${fmt(m.pcs)}</div><div class="m">${monthLabel(m.month)}</div></div>`).join('')}
    </div></div>` : `<p style="color:var(--muted)">No production entries yet - add your first day in Daily Production.</p>`}
  </div>`;
}

function recentTable(rows, cols, delTable){
  if(!rows.length) return `<p style="color:var(--muted);margin-top:10px">No entries yet.</p>`;
  return `<div class="scroll" style="margin-top:14px"><table>
    <tr>${cols.map(c=>`<th class="${c.num?'num':''}">${c.h}</th>`).join('')}<th></th></tr>
    ${rows.slice(-15).reverse().map(r=>`<tr>${cols.map(c=>`<td class="${c.num?'num':''}">${c.f(r)}</td>`).join('')}
      <td><button class="mini" onclick="del('${delTable}',${r.id})">delete</button></td></tr>`).join('')}
  </table></div>`;
}

function productionScreen(){
  const gp=S('gloves_per_poly'), gr=S('gloves_per_pora');
  return `<div class="card">
    <h2>Daily production entry</h2>
    <form class="grid" onsubmit="return addProduction(event)">
      <div><label>Date</label><input type="date" id="pl_date" value="${today()}" required></div>
      <div><label>Product</label><select id="pl_product">${D.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div><label>Pcs produced</label><input type="number" step="any" id="pl_pcs" required inputmode="decimal"></div>
      <div><label>White yarn (kg)</label><input type="number" step="any" id="pl_white" inputmode="decimal"></div>
      <div><label>Blue yarn (kg)</label><input type="number" step="any" id="pl_blue" inputmode="decimal"></div>
      <div><label>Rubber rolls</label><input type="number" step="any" id="pl_rubber" inputmode="decimal"></div>
      <div><label>Note</label><input type="text" id="pl_note"></div>
      <div><button class="btn">Add entry</button></div>
    </form>
    <div class="autoline">Bags calculate automatically: poly = pcs &divide; ${gp}, pora = pcs &divide; ${gr}.</div>
    <div id="msg_pl" class="msg"></div>
    ${recentTable(D.production, [
      {h:"Date",f:r=>r.date},{h:"Product",f:r=>esc(prodName(r.product_id))},
      {h:"Pcs",num:1,f:r=>fmt(r.pcs)},{h:"White kg",num:1,f:r=>fmt2(r.white_yarn)},
      {h:"Blue kg",num:1,f:r=>fmt2(r.blue_yarn)},{h:"Rubber",num:1,f:r=>fmt2(r.rubber_rolls)},
      {h:"Poly (auto)",num:1,f:r=>fmt2(r.pcs/gp)},{h:"Pora (auto)",num:1,f:r=>fmt2(r.pcs/gr)}
    ],'production_log')}
  </div>`;
}

function purchasesScreen(){
  return `<div class="card">
    <h2>Raw material purchases (from BLINE)</h2>
    <form class="grid" onsubmit="return addPurchase(event)">
      <div><label>Date</label><input type="date" id="pu_date" value="${today()}" required></div>
      <div><label>Material</label><select id="pu_mat">${D.materials.map(m=>`<option value="${m.id}">${esc(m.name)} (${m.unit})</option>`).join('')}</select></div>
      <div><label>Qty</label><input type="number" step="any" id="pu_qty" required inputmode="decimal"></div>
      <div><label>Unit price (Rs)</label><input type="number" step="any" id="pu_price" required inputmode="decimal"></div>
      <div><label>Note</label><input type="text" id="pu_note"></div>
      <div><button class="btn">Add purchase</button></div>
    </form>
    <div class="autoline">Every purchase automatically appears on the BLINE statement as "Materials taken" and adds to material stock.</div>
    <div id="msg_pu" class="msg"></div>
    ${recentTable(D.purchases, [
      {h:"Date",f:r=>r.date},{h:"Material",f:r=>esc(matName(r.material_id))},
      {h:"Qty",num:1,f:r=>fmt2(r.qty)},{h:"Price",num:1,f:r=>fmt2(r.unit_price)},
      {h:"Total",num:1,f:r=>fmt(r.qty*r.unit_price)},{h:"Note",f:r=>esc(r.note)}
    ],'purchases')}
  </div>`;
}

function salesScreen(){
  const pr = pricing();
  return `<div class="card">
    <h2>Deliveries to BLINE</h2>
    <form class="grid" onsubmit="return addSale(event)">
      <div><label>Date</label><input type="date" id="sa_date" value="${today()}" required></div>
      <div><label>Product</label><select id="sa_product">${D.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div><label>Pcs</label><input type="number" step="any" id="sa_pcs" required inputmode="decimal"></div>
      <div><label>Price per pc (Rs)</label><input type="number" step="any" id="sa_price" required inputmode="decimal"></div>
      <div><label>Note</label><input type="text" id="sa_note"></div>
      <div><button class="btn">Add delivery</button></div>
    </form>
    <div class="autoline">${pr.minPrice!=null? `Minimum selling price: <b>Rs ${fmt2(pr.minPrice)}/pc</b> (cost Rs ${fmt2(pr.avg)} + ${(pr.margin*100).toFixed(0)}% margin). Deliveries deduct finished stock and appear on the BLINE statement.` : `Deliveries deduct finished stock and appear on the BLINE statement.`}</div>
    <div id="msg_sa" class="msg"></div>
    ${recentTable(D.sales, [
      {h:"Date",f:r=>r.date},{h:"Product",f:r=>esc(prodName(r.product_id))},
      {h:"Pcs",num:1,f:r=>fmt(r.pcs)},{h:"Price/pc",num:1,f:r=>fmt2(r.price_per_pc)},
      {h:"Revenue",num:1,f:r=>fmt(r.pcs*r.price_per_pc)},
      {h:"Profit",num:1,f:r=>{ const p=pricing(); if(p.avg==null) return "-"; const pf=r.pcs*(r.price_per_pc-p.avg);
        return `<span class="${pf<0?'balneg':'balpos'}">${fmt(pf)}</span>`; }},
      {h:"Note",f:r=>esc(r.note)}
    ],'sales')}
  </div>`;
}

function cashScreen(){
  const bal = cashBalance();
  return `<div class="card">
    <h2>Cash book &nbsp; <span style="font-size:16px;color:${bal<0?'var(--red)':'var(--green)'}">balance Rs ${fmt(bal)}</span></h2>
    <form class="grid" onsubmit="return addCash(event)">
      <div><label>Date</label><input type="date" id="cb_date" value="${today()}" required></div>
      <div><label>Description</label><input type="text" id="cb_desc" required></div>
      <div><label>Category</label><select id="cb_cat">${CASH_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Money in (Rs)</label><input type="number" step="any" id="cb_in" inputmode="decimal"></div>
      <div><label>Money out (Rs)</label><input type="number" step="any" id="cb_out" inputmode="decimal"></div>
      <div><button class="btn">Add entry</button></div>
    </form>
    <div class="autoline">"From BLINE" and "To BLINE" entries automatically appear on the BLINE statement as payments.</div>
    <div id="msg_cb" class="msg"></div>
    ${recentTable(D.cash, [
      {h:"Date",f:r=>r.date},{h:"Description",f:r=>esc(r.description)},{h:"Category",f:r=>esc(r.category)},
      {h:"In",num:1,f:r=>r.money_in?fmt(r.money_in):""},{h:"Out",num:1,f:r=>r.money_out?fmt(r.money_out):""}
    ],'cash_book')}
  </div>`;
}

function overheadsScreen(){
  const m = today().slice(0,7);
  return `<div class="card">
    <h2>Monthly overheads</h2>
    <form class="grid" onsubmit="return addOverheads(event)">
      <div><label>Month</label><input type="month" id="oh_month" value="${m}" required></div>
      ${OH_COLS.map(c=>`<div><label>${c} (Rs)</label><input type="number" step="any" id="oh_${c}" inputmode="decimal"></div>`).join('')}
      <div><button class="btn">Save month</button></div>
    </form>
    <div class="autoline">Saving a month again replaces its figures. Overheads divide across that month's pcs in Costing.</div>
    <div id="msg_oh" class="msg"></div>
    <div class="scroll" style="margin-top:14px"><table>
      <tr><th>Month</th>${OH_COLS.map(c=>`<th class="num">${c}</th>`).join('')}<th class="num">Total</th></tr>
      ${D.overheads.slice().reverse().map(o=>`<tr><td>${monthLabel(monthKey(o.month))}</td>
        ${OH_COLS.map(c=>`<td class="num">${fmt(o[c])}</td>`).join('')}
        <td class="num"><b>${fmt(OH_COLS.reduce((s,c)=>s+Number(o[c]||0),0))}</b></td></tr>`).join('')}
    </table></div>
  </div>`;
}

function statementScreen(){
  const st = statement();
  return `<div class="card">
    <h2>BLINE account statement</h2>
    <div class="kpi" style="max-width:340px;margin-bottom:14px">
      <div class="lbl">Current balance</div>
      <div class="val ${st.balance<0?'balneg':'balpos'}">Rs ${fmt(Math.abs(st.balance))}</div>
      <div class="note">${st.balance===0?"Settled":st.balance>0?"BLINE owes factory":"Factory owes BLINE"}</div>
    </div>
    <div class="autoline" style="margin-bottom:12px">Fully automatic - built from Purchases, Deliveries, and Cash Book (From/To BLINE). Nothing is entered here.</div>
    <div class="scroll"><table>
      <tr><th>Date</th><th>Description</th><th>Type</th><th class="num">BLINE owes +</th><th class="num">Factory owes +</th><th class="num">Balance</th></tr>
      ${st.rows.map(r=>`<tr><td>${r.date}</td><td>${esc(r.desc)}</td><td>${r.type}</td>
        <td class="num">${r.side>0?fmt(r.amt):""}</td><td class="num">${r.side<0?fmt(r.amt):""}</td>
        <td class="num"><b class="${r.bal<0?'balneg':'balpos'}">${fmt(r.bal)}</b></td></tr>`).join('')}
    </table></div>
  </div>`;
}

function costingScreen(){
  const mc = monthlyCosting(); const pr = pricing();
  return `<div class="card">
    <h2>Monthly costing</h2>
    <div class="scroll"><table>
      <tr><th>Month</th><th class="num">White kg</th><th class="num">Blue kg</th><th class="num">Rubber</th>
      <th class="num">Poly</th><th class="num">Pora</th><th class="num">Pcs</th>
      <th class="num">Material Rs</th><th class="num">Overheads Rs</th><th class="num">Total Rs</th>
      <th class="num">Cost/pc</th><th class="num">Yarn kg/pc</th></tr>
      ${mc.map(m=>`<tr><td>${monthLabel(m.month)}</td><td class="num">${fmt2(m.white)}</td><td class="num">${fmt2(m.blue)}</td>
        <td class="num">${fmt2(m.rubber)}</td><td class="num">${fmt(m.poly)}</td><td class="num">${fmt2(m.pora)}</td>
        <td class="num">${fmt(m.pcs)}</td><td class="num">${fmt(m.matCost)}</td><td class="num">${fmt(m.ohTotal)}</td>
        <td class="num">${fmt(m.total)}</td><td class="num"><b>${m.costPc!=null?fmt2(m.costPc):"-"}</b></td>
        <td class="num">${m.yarnPc!=null?m.yarnPc.toFixed(4):"-"}</td></tr>`).join('')}
    </table></div>
  </div>
  <div class="card">
    <h2>Pricing</h2>
    <table>
      <tr><td>Cost per pc - latest month</td><td class="num"><b>${pr.latest!=null?"Rs "+fmt2(pr.latest):"-"}</b></td></tr>
      <tr><td>Cost per pc - all months average</td><td class="num"><b>${pr.avg!=null?"Rs "+fmt2(pr.avg):"-"}</b></td></tr>
      <tr><td>Target margin</td><td class="num">${(pr.margin*100).toFixed(1)}%</td></tr>
      <tr><td><b>Minimum selling price per pc</b></td><td class="num"><b style="color:var(--green)">${pr.minPrice!=null?"Rs "+fmt2(pr.minPrice):"-"}</b></td></tr>
    </table>
    <div class="autoline">Quote BLINE from the all-months average, not a single month - cost per pc swings with production volume.</div>
  </div>`;
}

function stocksScreen(){
  const mats = materialStats(); const fs = finishedStock();
  return `<div class="card">
    <h2>Raw material stock</h2>
    <div class="scroll"><table>
      <tr><th>Material</th><th class="num">Purchased</th><th class="num">Avg cost</th><th class="num">Used</th><th class="num">Stock on hand</th></tr>
      ${mats.map(m=>`<tr><td>${esc(m.name)} (${m.unit})</td><td class="num">${fmt2(m.purchased)}</td>
        <td class="num">${fmt2(m.avg)}</td><td class="num">${fmt2(m.used)}</td>
        <td class="num"><b class="${m.stock<0?'balneg':''}">${fmt2(m.stock)}</b></td></tr>`).join('')}
    </table></div>
  </div>
  <div class="card">
    <h2>Finished goods stock</h2>
    <div class="scroll"><table>
      <tr><th>Product</th><th class="num">Produced (pcs)</th><th class="num">Delivered (pcs)</th><th class="num">Stock (pcs)</th></tr>
      ${fs.map(p=>`<tr><td>${esc(p.name)}</td><td class="num">${fmt(p.made)}</td><td class="num">${fmt(p.sold)}</td>
        <td class="num"><b class="${p.stock<0?'balneg':''}">${fmt(p.stock)}</b></td></tr>`).join('')}
    </table></div>
  </div>`;
}

/* ---------- inserts / deletes ---------- */
function num(id){ const v=document.getElementById(id).value; return v===""?0:Number(v); }
function val(id){ return document.getElementById(id).value; }
function showMsg(id, ok, text){ const el=document.getElementById(id); el.className='msg '+(ok?'ok':'err'); el.textContent=text; }

async function addProduction(e){ e.preventDefault();
  const {error} = await sb.from('production_log').insert({date:val('pl_date'), product_id:Number(val('pl_product')),
    pcs:num('pl_pcs'), white_yarn:num('pl_white'), blue_yarn:num('pl_blue'), rubber_rolls:num('pl_rubber'), note:val('pl_note')});
  if(error) return showMsg('msg_pl',false,error.message), false;
  await loadAll(); render(); return false;
}
async function addPurchase(e){ e.preventDefault();
  const {error} = await sb.from('purchases').insert({date:val('pu_date'), material_id:Number(val('pu_mat')),
    qty:num('pu_qty'), unit_price:num('pu_price'), note:val('pu_note')});
  if(error) return showMsg('msg_pu',false,error.message), false;
  await loadAll(); render(); return false;
}
async function addSale(e){ e.preventDefault();
  const {error} = await sb.from('sales').insert({date:val('sa_date'), product_id:Number(val('sa_product')),
    pcs:num('sa_pcs'), price_per_pc:num('sa_price'), note:val('sa_note')});
  if(error) return showMsg('msg_sa',false,error.message), false;
  await loadAll(); render(); return false;
}
async function addCash(e){ e.preventDefault();
  const {error} = await sb.from('cash_book').insert({date:val('cb_date'), description:val('cb_desc'),
    category:val('cb_cat'), money_in:num('cb_in'), money_out:num('cb_out')});
  if(error) return showMsg('msg_cb',false,error.message), false;
  await loadAll(); render(); return false;
}
async function addOverheads(e){ e.preventDefault();
  const month = val('oh_month')+"-01";
  const row = Object.fromEntries(OH_COLS.map(c=>[c, num('oh_'+c)]));
  const {error} = await sb.from('overheads').upsert({month, ...row}, {onConflict:'month'});
  if(error) return showMsg('msg_oh',false,error.message), false;
  await loadAll(); render(); return false;
}
async function del(table,id){
  if(!confirm('Delete this entry?')) return;
  const {error} = await sb.from(table).delete().eq('id',id);
  if(error) return alert(error.message);
  await loadAll(); render();
}

/* ---------- boot ---------- */
(async ()=>{
  renderNav();
  try{ await loadAll(); render(); }catch(e){ console.error(e); }
})();
</script>
</body>
</html>
