<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Manager</title>
<style>
:root{
  --yellow:#FFD400; --black:#141414; --ink:#1f1f1f; --paper:#f6f5f1;
  --card:#ffffff; --line:#e3e1da; --muted:#7a776e; --green:#1a7f37;
  --red:#b42318; --redbg:#fdecea; --greenbg:#e6f4ea; --amber:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--paper);color:var(--ink);font-size:15px}
.hazard{background:repeating-linear-gradient(45deg,var(--yellow) 0 14px,var(--black) 14px 28px);height:8px}
header{background:var(--black);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:24px;letter-spacing:1px;text-transform:uppercase;font-weight:800}
header h1 span{color:var(--yellow)}
header .sub{color:#bbb;font-size:12px}
nav{display:flex;gap:4px;background:var(--black);padding:0 10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{font-size:13px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;
  background:#2a2a2a;color:#ddd;border:none;padding:9px 14px;cursor:pointer;white-space:nowrap;border-radius:3px}
nav button.active{background:var(--yellow);color:var(--black)}
main{width:100%;margin:0;padding:18px 22px 60px}
h2{font-size:19px;text-transform:uppercase;letter-spacing:.5px;margin:6px 0 14px;
  border-left:6px solid var(--yellow);padding-left:10px;font-weight:800}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px}
.kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.kpi .val{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.kpi .note{font-size:12px;color:var(--muted);margin-top:2px}
.kpi.warn .val{color:var(--red)}
.kpi.good .val{color:var(--green)}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#fff;background:var(--black);padding:8px 9px;text-align:left}
td{padding:8px 9px;border-bottom:1px solid var(--line);font-size:14px}
td.num,th.num{text-align:right}
tr:hover td{background:#faf9f5}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.tag.ok{background:var(--greenbg);color:var(--green)}
.tag.bad{background:var(--redbg);color:var(--red)}
.tag.warn{background:#fef3e2;color:var(--amber)}
form.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
input,select{width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:5px;font-size:15px;background:#fff}
input:focus,select:focus{outline:2px solid var(--yellow);border-color:var(--black)}
button.btn{font-size:14px;text-transform:uppercase;letter-spacing:.6px;font-weight:800;
  background:var(--yellow);color:var(--black);border:2px solid var(--black);border-radius:5px;padding:10px 20px;cursor:pointer}
button.btn.grey{background:#eee}
button.btn:active{transform:translateY(1px)}
button.mini{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px}
.autoline{font-size:13px;color:var(--muted);background:#fbf8ec;border:1px dashed #d8c66a;border-radius:5px;padding:8px 10px;margin-top:10px}
.balpos{color:var(--green)} .balneg{color:var(--red)}
.chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding:10px 4px 0}
.bar{flex:1;background:var(--yellow);border:2px solid var(--black);border-bottom:none;position:relative;min-width:26px;border-radius:3px 3px 0 0}
.bar .v{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:11px;font-weight:700}
.bar .m{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}
.chartwrap{padding-bottom:26px;overflow-x:auto}
.scroll{overflow-x:auto}
#banner{display:none;background:#fef3e2;color:var(--amber);padding:10px 14px;font-size:13px;text-align:center}
@media(max-width:600px){ .kpi .val{font-size:22px} main{padding:12px 10px 60px} td,th{padding:7px 6px;font-size:13px} }
</style>
</head>
<body>
<div class="hazard"></div>
<header>
  <h1>Factory <span>Manager</span></h1>
  <div class="sub">Glove factory &middot; BLINE group</div>
</header>
<div id="banner"></div>
<nav id="nav"></nav>
<main id="main"></main>

<script>
"use strict";
/* ============================================================
   FACTORY MANAGER v2 - standalone, no setup needed.
   - Add your own products and materials in the Items tab.
   - Data saves automatically in this browser.
   - Export a backup weekly from Setup & Backup.
   ============================================================ */

var OH_CATS = ["Wages","Electricity","Rent","Transport","Maintenance","Other"];
var CASH_CATS = ["Opening","From BLINE","To BLINE"].concat(OH_CATS).concat(["Capital In","Drawings"]);
var STORE_KEY = "factory_manager_v2";

function freshData(){
  return {
    nextId: 1,
    products: ["Cotton Glove"],
    materials: [
      {name:"White Yarn 7.4s", unit:"kg"},
      {name:"White Yarn 7.8s", unit:"kg"},
      {name:"Blue Yarn", unit:"kg"},
      {name:"Rubber Roll", unit:"roll"},
      {name:"Ribbon", unit:"kg"},
      {name:"Polythene Bags", unit:"pcs", auto:"poly"},
      {name:"Pora Bags", unit:"pcs", auto:"pora"}
    ],
    purchases: [],   // {id,date,material,qty,price,note}
    production: [],  // {id,date,product,pcs,use:{materialName:qty},note}
    sales: [],       // {id,date,product,pcs,price,note}
    cash: [],        // {id,date,desc,cat,inn,out}
    opening: { raw: [], finished: [], bline: 0 },
    settings: { poly:12, pora:600, lead:14, margin:0.25 }
  };
}
var D = freshData();
var storageOK = true;

function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(D)); }
  catch(e){ storageOK = false; showBanner(); }
}
function load(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.materials) D = d; }
  }catch(e){ storageOK = false; }
  showBanner();
}
function showBanner(){
  var b = document.getElementById('banner');
  if(!storageOK){
    b.style.display = 'block';
    b.textContent = "This browser is not saving data (private mode?). The app still works, but export a backup before closing, or open the file in normal Chrome.";
  }
}

/* ---------- helpers ---------- */
function fmt(n){ return (n==null||isNaN(n)) ? "-" : Math.round(Number(n)).toLocaleString('en-US'); }
function fmt2(n){ return (n==null||isNaN(n)) ? "-" : Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ return new Date().toISOString().slice(0,10); }
function monthKey(d){ return d.slice(0,7); }
function monthLabel(k){
  var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return m[Number(k.slice(5,7))-1]+" "+k.slice(2,4);
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function N(v){ var x=Number(v); return isNaN(x)?0:x; }
function inputMats(){ return D.materials.filter(function(m){return !m.auto;}); }
function autoDiv(m){ return m.auto==="poly" ? (D.settings.poly||12) : (D.settings.pora||600); }

/* ---------- computations ---------- */
function materialUsage(rows){
  var u = {};
  D.materials.forEach(function(m){
    var t = 0;
    rows.forEach(function(r){
      if(m.auto) t += N(r.pcs)/autoDiv(m);
      else t += N(r.use && r.use[m.name]);
    });
    u[m.name] = t;
  });
  return u;
}

function materialStats(){
  var used = materialUsage(D.production);
  return D.materials.map(function(m){
    var qty=0, spend=0;
    D.purchases.forEach(function(p){ if(p.material===m.name){ qty+=N(p.qty); spend+=N(p.qty)*N(p.price); } });
    D.opening.raw.forEach(function(o){ if(o.material===m.name){ qty+=N(o.qty); spend+=N(o.qty)*N(o.cost); } });
    var avg = qty? spend/qty : 0;
    var u = used[m.name]||0;
    return { name:m.name, unit:m.unit, auto:m.auto, purchased:qty, spend:spend, avg:avg, used:u, stock:qty-u, value:(qty-u)*avg };
  });
}

function finishedStock(){
  return D.products.map(function(p){
    var made=0, sold=0;
    D.production.forEach(function(r){ if(r.product===p) made+=N(r.pcs); });
    D.opening.finished.forEach(function(o){ if(o.product===p) made+=N(o.pcs); });
    D.sales.forEach(function(r){ if(r.product===p) sold+=N(r.pcs); });
    return { name:p, made:made, sold:sold, stock:made-sold };
  });
}

function overheadsByMonth(){
  var out = {};
  D.cash.forEach(function(c){
    if(OH_CATS.indexOf(c.cat)>=0 && N(c.out)>0){
      var k = monthKey(c.date);
      out[k] = (out[k]||0) + N(c.out);
    }
  });
  return out;
}

function monthlyCosting(){
  var mats = materialStats();
  var avgMap = {}; mats.forEach(function(m){avgMap[m.name]=m.avg;});
  var months = {};
  D.production.forEach(function(r){
    var k = monthKey(r.date);
    months[k] = months[k] || { month:k, pcs:0, rows:[] };
    months[k].pcs += N(r.pcs);
    months[k].rows.push(r);
  });
  var oh = overheadsByMonth();
  return Object.keys(months).sort().map(function(k){
    var M = months[k];
    var usage = materialUsage(M.rows);
    var matCost = 0, kgUsed = 0;
    D.materials.forEach(function(m){
      matCost += (usage[m.name]||0)*(avgMap[m.name]||0);
      if(m.unit==="kg") kgUsed += usage[m.name]||0;
    });
    var ohTotal = oh[k]||0;
    var total = matCost + ohTotal;
    return { month:k, pcs:M.pcs, usage:usage, matCost:matCost, ohTotal:ohTotal, total:total,
             costPc: M.pcs? total/M.pcs : null, kgPc: M.pcs? kgUsed/M.pcs : null };
  });
}

function pricing(){
  var mc = monthlyCosting().filter(function(m){return m.costPc!=null;});
  var latest = mc.length? mc[mc.length-1].costPc : null;
  var avg = null;
  if(mc.length) avg = mc.reduce(function(s,m){return s+m.costPc;},0)/mc.length;
  var margin = D.settings.margin;
  var minPrice = (avg!=null && margin<1)? avg/(1-margin) : null;
  return { latest:latest, avg:avg, margin:margin, minPrice:minPrice };
}

function costPcForValue(){
  var pr = pricing();
  if(pr.avg!=null) return pr.avg;
  var f = D.opening.finished.filter(function(o){return N(o.costPc)>0;});
  if(f.length) return f.reduce(function(s,o){return s+N(o.costPc);},0)/f.length;
  return 0;
}

function statement(){
  var rows = [];
  D.purchases.forEach(function(p){ rows.push({date:p.date, id:p.id, desc:p.material+" x "+p.qty, type:"Materials taken", amt:N(p.qty)*N(p.price), side:-1}); });
  D.sales.forEach(function(s){ rows.push({date:s.date, id:s.id, desc:s.product+" "+fmt(s.pcs)+" pcs", type:"Gloves delivered", amt:N(s.pcs)*N(s.price), side:+1}); });
  D.cash.forEach(function(c){
    if(c.cat==="From BLINE" && N(c.inn)>0) rows.push({date:c.date, id:c.id, desc:c.desc, type:"Payment received", amt:N(c.inn), side:-1});
    if(c.cat==="To BLINE" && N(c.out)>0)   rows.push({date:c.date, id:c.id, desc:c.desc, type:"Payment made", amt:N(c.out), side:+1});
  });
  rows.sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:(a.id-b.id); });
  var bal = N(D.opening.bline);
  rows.forEach(function(r){ bal += r.side*r.amt; r.bal=bal; });
  return { rows:rows, balance:bal, opening:N(D.opening.bline) };
}

function cashBalance(){ return D.cash.reduce(function(s,c){return s+N(c.inn)-N(c.out);},0); }

function daysLeft(){
  var cutoff = new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  var recent = D.production.filter(function(r){return r.date>=cutoff;});
  var use30 = materialUsage(recent);
  return materialStats().map(function(m){
    var daily = (use30[m.name]||0)/30;
    var days = daily>0 ? m.stock/daily : null;
    var status = "NO RECENT USE";
    if(daily>0) status = m.stock<=0 ? "OUT OF STOCK" : (days<=D.settings.lead ? "REORDER NOW" : "OK");
    return { name:m.name, unit:m.unit, stock:m.stock, daily:daily, days:days, status:status };
  });
}

function capital(){
  var cash = cashBalance();
  var rawVal = materialStats().reduce(function(s,m){return s+m.value;},0);
  var fs = finishedStock().reduce(function(s,p){return s+p.stock;},0);
  var finVal = fs * costPcForValue();
  var bline = statement().balance;
  var netWorth = cash + rawVal + finVal + bline;
  var openCash = D.cash.filter(function(c){return c.cat==="Opening";}).reduce(function(s,c){return s+N(c.inn)-N(c.out);},0);
  var openRaw = D.opening.raw.reduce(function(s,o){return s+N(o.qty)*N(o.cost);},0);
  var openFin = D.opening.finished.reduce(function(s,o){return s+N(o.pcs)*N(o.costPc);},0);
  var openCap = openCash + openRaw + openFin + N(D.opening.bline);
  var capIn = D.cash.filter(function(c){return c.cat==="Capital In";}).reduce(function(s,c){return s+N(c.inn);},0);
  var draw = D.cash.filter(function(c){return c.cat==="Drawings";}).reduce(function(s,c){return s+N(c.out);},0);
  var growth = netWorth - openCap - capIn + draw;
  return { cash:cash, rawVal:rawVal, finPcs:fs, finVal:finVal, bline:bline, netWorth:netWorth,
           openCap:openCap, capIn:capIn, draw:draw, growth:growth,
           growthPct: openCap!==0 ? growth/openCap : null };
}

/* ---------- screens ---------- */
var TABS = [
  ["dashboard","Dashboard"],["production","Production"],["purchases","Purchases"],
  ["sales","Deliveries"],["cash","Cash Book"],["statement","BLINE Statement"],
  ["costing","Costing"],["stocks","Stocks"],["capital","Capital"],
  ["items","Products & Materials"],["setup","Setup & Backup"]
];
var currentTab = "dashboard";

function dashboardScreen(){
  var cash = cashBalance();
  var fs = finishedStock().reduce(function(s,p){return s+p.stock;},0);
  var st = statement();
  var cap = capital();
  var dl = daysLeft();
  var mc = monthlyCosting();
  var maxPcs = Math.max.apply(null,[1].concat(mc.map(function(m){return m.pcs;})));
  var html = '<div class="kpis">'
    +'<div class="kpi '+(cash<0?'warn':'')+'"><div class="lbl">Cash balance</div><div class="val">Rs '+fmt(cash)+'</div></div>'
    +'<div class="kpi"><div class="lbl">Finished stock</div><div class="val">'+fmt(fs)+' pcs</div></div>'
    +'<div class="kpi '+(st.balance<0?'warn':'good')+'"><div class="lbl">BLINE position</div><div class="val">Rs '+fmt(Math.abs(st.balance))+'</div>'
      +'<div class="note">'+(st.balance===0?"Settled":st.balance>0?"BLINE owes factory":"Factory owes BLINE")+'</div></div>'
    +'<div class="kpi '+(cap.growth<0?'warn':'good')+'"><div class="lbl">Growth since opening</div><div class="val">Rs '+fmt(cap.growth)+'</div>'
      +'<div class="note">Net worth Rs '+fmt(cap.netWorth)+'</div></div>'
    +'</div>';
  html += '<div class="card"><h2>Raw materials - days left</h2><div class="scroll"><table>'
    +'<tr><th>Material</th><th class="num">Stock</th><th class="num">Daily use (30d)</th><th class="num">Days left</th><th>Status</th></tr>'
    + dl.map(function(m){ return '<tr><td>'+esc(m.name)+'</td><td class="num">'+fmt2(m.stock)+' '+m.unit+'</td>'
      +'<td class="num">'+fmt2(m.daily)+'</td><td class="num">'+(m.days!=null?Math.round(m.days):"-")+'</td>'
      +'<td><span class="tag '+(m.status==='OK'?'ok':m.status==='NO RECENT USE'?'warn':'bad')+'">'+m.status+'</span></td></tr>'; }).join('')
    +'</table></div><div class="autoline">Reorder flag fires when days left &le; '+D.settings.lead+' days (change in Setup).</div></div>';
  html += '<div class="card"><h2>Production by month (pcs)</h2>';
  if(mc.length){
    html += '<div class="chartwrap"><div class="chart">'
      + mc.map(function(m){ return '<div class="bar" style="height:'+Math.max(6,m.pcs/maxPcs*100)+'%"><div class="v">'+fmt(m.pcs)+'</div><div class="m">'+monthLabel(m.month)+'</div></div>'; }).join('')
      +'</div></div>';
  } else {
    html += '<p style="color:var(--muted)">No production yet - add your first day in the Production tab.</p>';
  }
  html += '</div>';
  return html;
}

function recentRows(rows, cols, delFn){
  if(!rows.length) return '<p style="color:var(--muted);margin-top:10px">No entries yet.</p>';
  var last = rows.slice(-15).reverse();
  return '<div class="scroll" style="margin-top:14px"><table><tr>'
    + cols.map(function(c){return '<th class="'+(c.num?'num':'')+'">'+c.h+'</th>';}).join('') + '<th></th></tr>'
    + last.map(function(r){ return '<tr>'+cols.map(function(c){return '<td class="'+(c.num?'num':'')+'">'+c.f(r)+'</td>';}).join('')
      +'<td><button class="mini" onclick="'+delFn+'('+r.id+')">delete</button></td></tr>'; }).join('')
    +'</table></div>';
}

function useSummary(r){
  var parts = [];
  inputMats().forEach(function(m){
    var q = r.use ? N(r.use[m.name]) : 0;
    if(q) parts.push(esc(m.name)+": "+fmt2(q));
  });
  D.materials.forEach(function(m){
    if(m.auto) parts.push(esc(m.name)+": "+fmt2(N(r.pcs)/autoDiv(m))+" (auto)");
  });
  return parts.join("<br>");
}

function productionScreen(){
  var matInputs = inputMats().map(function(m,i){
    return '<div><label>'+esc(m.name)+' ('+m.unit+')</label><input type="number" step="any" id="mu_'+i+'" inputmode="decimal"></div>';
  }).join('');
  var autoNote = D.materials.filter(function(m){return m.auto;}).map(function(m){
    return esc(m.name)+' = pcs &divide; '+autoDiv(m);
  }).join(', ');
  return '<div class="card"><h2>Daily production entry</h2>'
    +'<form class="grid" onsubmit="return addProduction(event)">'
    +'<div><label>Date</label><input type="date" id="pl_date" value="'+today()+'" required></div>'
    +'<div><label>Product</label><select id="pl_product">'+D.products.map(function(p){return '<option>'+esc(p)+'</option>';}).join('')+'</select></div>'
    +'<div><label>Pcs produced</label><input type="number" step="any" id="pl_pcs" required inputmode="decimal"></div>'
    + matInputs
    +'<div><label>Note</label><input type="text" id="pl_note"></div>'
    +'<div><button class="btn">Add entry</button></div></form>'
    +'<div class="autoline">Automatic: '+autoNote+'. New materials added in Products &amp; Materials appear here instantly.</div>'
    + recentRows(D.production,[
        {h:"Date",f:function(r){return r.date;}},{h:"Product",f:function(r){return esc(r.product);}},
        {h:"Pcs",num:1,f:function(r){return fmt(r.pcs);}},
        {h:"Materials used",f:useSummary},
        {h:"Note",f:function(r){return esc(r.note);}}
      ],'delProduction')
    +'</div>';
}

function purchasesScreen(){
  return '<div class="card"><h2>Raw material purchases (from BLINE)</h2>'
    +'<form class="grid" onsubmit="return addPurchase(event)">'
    +'<div><label>Date</label><input type="date" id="pu_date" value="'+today()+'" required></div>'
    +'<div><label>Material</label><select id="pu_mat">'+D.materials.map(function(m){return '<option>'+esc(m.name)+'</option>';}).join('')+'</select></div>'
    +'<div><label>Qty</label><input type="number" step="any" id="pu_qty" required inputmode="decimal"></div>'
    +'<div><label>Unit price (Rs)</label><input type="number" step="any" id="pu_price" required inputmode="decimal"></div>'
    +'<div><label>Note</label><input type="text" id="pu_note"></div>'
    +'<div><button class="btn">Add purchase</button></div></form>'
    +'<div class="autoline">Purchases appear automatically on the BLINE statement and add to material stock.</div>'
    + recentRows(D.purchases,[
        {h:"Date",f:function(r){return r.date;}},{h:"Material",f:function(r){return esc(r.material);}},
        {h:"Qty",num:1,f:function(r){return fmt2(r.qty);}},{h:"Price",num:1,f:function(r){return fmt2(r.price);}},
        {h:"Total",num:1,f:function(r){return fmt(r.qty*r.price);}},{h:"Note",f:function(r){return esc(r.note);}}
      ],'delPurchase')
    +'</div>';
}

function salesScreen(){
  var pr = pricing();
  var tip = pr.minPrice!=null
    ? 'Minimum selling price: <b>Rs '+fmt2(pr.minPrice)+'/pc</b> (cost Rs '+fmt2(pr.avg)+' + '+(pr.margin*100).toFixed(0)+'% margin). Deliveries deduct finished stock and appear on the statement.'
    : 'Deliveries deduct finished stock and appear on the BLINE statement.';
  return '<div class="card"><h2>Deliveries to BLINE</h2>'
    +'<form class="grid" onsubmit="return addSale(event)">'
    +'<div><label>Date</label><input type="date" id="sa_date" value="'+today()+'" required></div>'
    +'<div><label>Product</label><select id="sa_product">'+D.products.map(function(p){return '<option>'+esc(p)+'</option>';}).join('')+'</select></div>'
    +'<div><label>Pcs</label><input type="number" step="any" id="sa_pcs" required inputmode="decimal"></div>'
    +'<div><label>Price per pc (Rs)</label><input type="number" step="any" id="sa_price" required inputmode="decimal"></div>'
    +'<div><label>Note</label><input type="text" id="sa_note"></div>'
    +'<div><button class="btn">Add delivery</button></div></form>'
    +'<div class="autoline">'+tip+'</div>'
    + recentRows(D.sales,[
        {h:"Date",f:function(r){return r.date;}},{h:"Product",f:function(r){return esc(r.product);}},
        {h:"Pcs",num:1,f:function(r){return fmt(r.pcs);}},{h:"Price/pc",num:1,f:function(r){return fmt2(r.price);}},
        {h:"Revenue",num:1,f:function(r){return fmt(r.pcs*r.price);}},
        {h:"Profit",num:1,f:function(r){ var p=pricing(); if(p.avg==null) return "-";
          var pf=r.pcs*(r.price-p.avg); return '<span class="'+(pf<0?'balneg':'balpos')+'">'+fmt(pf)+'</span>'; }},
        {h:"Note",f:function(r){return esc(r.note);}}
      ],'delSale')
    +'</div>';
}

function cashScreen(){
  var bal = cashBalance();
  return '<div class="card"><h2>Cash book &nbsp; <span style="font-size:15px;color:'+(bal<0?'var(--red)':'var(--green)')+'">balance Rs '+fmt(bal)+'</span></h2>'
    +'<form class="grid" onsubmit="return addCash(event)">'
    +'<div><label>Date</label><input type="date" id="cb_date" value="'+today()+'" required></div>'
    +'<div><label>Description</label><input type="text" id="cb_desc" required></div>'
    +'<div><label>Category</label><select id="cb_cat">'+CASH_CATS.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div>'
    +'<div><label>Money in (Rs)</label><input type="number" step="any" id="cb_in" inputmode="decimal"></div>'
    +'<div><label>Money out (Rs)</label><input type="number" step="any" id="cb_out" inputmode="decimal"></div>'
    +'<div><button class="btn">Add entry</button></div></form>'
    +'<div class="autoline">"From/To BLINE" flow to the statement. Wages, Electricity, Rent, Transport, Maintenance, Other become monthly overheads in Costing. "Capital In" and "Drawings" feed the Capital tab.</div>'
    + recentRows(D.cash,[
        {h:"Date",f:function(r){return r.date;}},{h:"Description",f:function(r){return esc(r.desc);}},{h:"Category",f:function(r){return esc(r.cat);}},
        {h:"In",num:1,f:function(r){return r.inn?fmt(r.inn):"";}},{h:"Out",num:1,f:function(r){return r.out?fmt(r.out):"";}}
      ],'delCash')
    +'</div>';
}

function statementScreen(){
  var st = statement();
  return '<div class="card"><h2>BLINE account statement</h2>'
    +'<div class="kpi" style="max-width:340px;margin-bottom:14px"><div class="lbl">Current balance</div>'
    +'<div class="val '+(st.balance<0?'balneg':'balpos')+'">Rs '+fmt(Math.abs(st.balance))+'</div>'
    +'<div class="note">'+(st.balance===0?"Settled":st.balance>0?"BLINE owes factory":"Factory owes BLINE")+'</div></div>'
    +'<div class="autoline" style="margin-bottom:12px">Fully automatic - built from Purchases, Deliveries, and Cash Book. Nothing is entered here.</div>'
    +'<div class="scroll"><table>'
    +'<tr><th>Date</th><th>Description</th><th>Type</th><th class="num">BLINE owes +</th><th class="num">Factory owes +</th><th class="num">Balance</th></tr>'
    +'<tr><td></td><td><b>Opening balance</b></td><td>Opening</td><td class="num"></td><td class="num"></td>'
    +'<td class="num"><b class="'+(st.opening<0?'balneg':'balpos')+'">'+fmt(st.opening)+'</b></td></tr>'
    + st.rows.map(function(r){ return '<tr><td>'+r.date+'</td><td>'+esc(r.desc)+'</td><td>'+r.type+'</td>'
      +'<td class="num">'+(r.side>0?fmt(r.amt):"")+'</td><td class="num">'+(r.side<0?fmt(r.amt):"")+'</td>'
      +'<td class="num"><b class="'+(r.bal<0?'balneg':'balpos')+'">'+fmt(r.bal)+'</b></td></tr>'; }).join('')
    +'</table></div></div>';
}

function costingScreen(){
  var mc = monthlyCosting(); var pr = pricing();
  var matHdrs = D.materials.map(function(m){return '<th class="num">'+esc(m.name)+'</th>';}).join('');
  return '<div class="card"><h2>Monthly costing</h2><div class="scroll"><table>'
    +'<tr><th>Month</th>'+matHdrs+'<th class="num">Pcs</th>'
    +'<th class="num">Material Rs</th><th class="num">Overheads Rs</th><th class="num">Total Rs</th>'
    +'<th class="num">Cost/pc</th><th class="num">kg per pc</th></tr>'
    + (mc.length? mc.map(function(m){
        var matCells = D.materials.map(function(x){return '<td class="num">'+fmt2(m.usage[x.name]||0)+'</td>';}).join('');
        return '<tr><td>'+monthLabel(m.month)+'</td>'+matCells
        +'<td class="num">'+fmt(m.pcs)+'</td><td class="num">'+fmt(m.matCost)+'</td><td class="num">'+fmt(m.ohTotal)+'</td>'
        +'<td class="num">'+fmt(m.total)+'</td><td class="num"><b>'+(m.costPc!=null?fmt2(m.costPc):"-")+'</b></td>'
        +'<td class="num">'+(m.kgPc!=null?m.kgPc.toFixed(4):"-")+'</td></tr>'; }).join('')
      : '<tr><td colspan="14" style="color:var(--muted)">No production yet.</td></tr>')
    +'</table></div>'
    +'<div class="autoline">Overheads come automatically from Cash Book payments (Wages, Electricity, Rent, Transport, Maintenance, Other) each month.</div></div>'
    +'<div class="card"><h2>Pricing</h2><table>'
    +'<tr><td>Cost per pc - latest month</td><td class="num"><b>'+(pr.latest!=null?"Rs "+fmt2(pr.latest):"-")+'</b></td></tr>'
    +'<tr><td>Cost per pc - all months average</td><td class="num"><b>'+(pr.avg!=null?"Rs "+fmt2(pr.avg):"-")+'</b></td></tr>'
    +'<tr><td>Target margin</td><td class="num">'+(pr.margin*100).toFixed(1)+'%</td></tr>'
    +'<tr><td><b>Minimum selling price per pc</b></td><td class="num"><b style="color:var(--green)">'+(pr.minPrice!=null?"Rs "+fmt2(pr.minPrice):"-")+'</b></td></tr>'
    +'</table><div class="autoline">Quote BLINE from the all-months average - cost per pc swings with production volume.</div></div>';
}

function stocksScreen(){
  var mats = materialStats(); var fs = finishedStock();
  return '<div class="card"><h2>Raw material stock</h2><div class="scroll"><table>'
    +'<tr><th>Material</th><th class="num">Purchased</th><th class="num">Avg cost</th><th class="num">Used</th><th class="num">Stock on hand</th><th class="num">Stock value Rs</th></tr>'
    + mats.map(function(m){ return '<tr><td>'+esc(m.name)+' ('+m.unit+')</td><td class="num">'+fmt2(m.purchased)+'</td>'
      +'<td class="num">'+fmt2(m.avg)+'</td><td class="num">'+fmt2(m.used)+'</td>'
      +'<td class="num"><b class="'+(m.stock<0?'balneg':'')+'">'+fmt2(m.stock)+'</b></td>'
      +'<td class="num">'+fmt(m.value)+'</td></tr>'; }).join('')
    +'</table></div></div>'
    +'<div class="card"><h2>Finished goods stock</h2><div class="scroll"><table>'
    +'<tr><th>Product</th><th class="num">Produced (pcs)</th><th class="num">Delivered (pcs)</th><th class="num">Stock (pcs)</th></tr>'
    + fs.map(function(p){ return '<tr><td>'+esc(p.name)+'</td><td class="num">'+fmt(p.made)+'</td><td class="num">'+fmt(p.sold)+'</td>'
      +'<td class="num"><b class="'+(p.stock<0?'balneg':'')+'">'+fmt(p.stock)+'</b></td></tr>'; }).join('')
    +'</table></div></div>';
}

function capitalScreen(){
  var c = capital();
  function row(l,v,note,cls){ return '<tr><td>'+l+'</td><td class="num '+(cls||'')+'"><b>'+v+'</b></td><td style="color:var(--muted);font-size:12px">'+(note||'')+'</td></tr>'; }
  return '<div class="card"><h2>Capital account - net worth &amp; growth</h2><div class="scroll"><table>'
    +'<tr><th colspan="3">Current position</th></tr>'
    + row('Cash balance','Rs '+fmt(c.cash))
    + row('Raw material stock value','Rs '+fmt(c.rawVal),'stock on hand x avg cost')
    + row('Finished stock value','Rs '+fmt(c.finVal), fmt(c.finPcs)+' pcs x cost per pc')
    + row('BLINE position','Rs '+fmt(c.bline),'positive = they owe you', c.bline<0?'balneg':'balpos')
    + row('NET WORTH','Rs '+fmt(c.netWorth),'what the factory is worth today', c.netWorth<0?'balneg':'balpos')
    +'<tr><th colspan="3">Growth since opening</th></tr>'
    + row('Opening capital','Rs '+fmt(c.openCap),'opening cash + stocks + BLINE balance')
    + row('Capital introduced since','Rs '+fmt(c.capIn),'Cash Book category: Capital In')
    + row('Drawings taken out','Rs '+fmt(c.draw),'Cash Book category: Drawings')
    + row('GROWTH (retained earnings)','Rs '+fmt(c.growth),'net worth - opening - capital in + drawings', c.growth<0?'balneg':'balpos')
    + row('Growth %', c.growthPct!=null? (c.growthPct*100).toFixed(1)+'%':'-','relative to opening capital', c.growth<0?'balneg':'balpos')
    +'</table></div>'
    +'<div class="autoline">Note the Net Worth on the 1st of every month - that is your growth curve.</div></div>';
}

function itemsScreen(){
  var prodRows = D.products.map(function(p,i){
    return '<tr><td>'+esc(p)+'</td><td><button class="mini" onclick="delProductName('+i+')">delete</button></td></tr>';
  }).join('');
  var matRows = D.materials.map(function(m,i){
    return '<tr><td>'+esc(m.name)+'</td><td>'+m.unit+'</td><td>'+(m.auto?'<span class="tag ok">auto from pcs</span>':'<span class="tag warn">daily entry</span>')+'</td>'
      +'<td><button class="mini" onclick="delMaterial('+i+')">delete</button></td></tr>';
  }).join('');
  return '<div class="card"><h2>Add product</h2>'
    +'<form class="grid" onsubmit="return addProductName(event)">'
    +'<div><label>Product name</label><input type="text" id="np_name" required placeholder="e.g. Dotted Glove"></div>'
    +'<div><button class="btn">Add product</button></div></form>'
    +'<div class="autoline">New products appear immediately in Production, Deliveries, Opening stock and Stocks.</div>'
    +'<div class="scroll" style="margin-top:14px"><table><tr><th>Product</th><th></th></tr>'+prodRows+'</table></div>'
    +'</div>'
    +'<div class="card"><h2>Add material</h2>'
    +'<form class="grid" onsubmit="return addMaterial(event)">'
    +'<div><label>Material name</label><input type="text" id="nm_name" required placeholder="e.g. Red Yarn"></div>'
    +'<div><label>Unit</label><select id="nm_unit"><option>kg</option><option>pcs</option><option>roll</option><option>litre</option><option>box</option></select></div>'
    +'<div><button class="btn">Add material</button></div></form>'
    +'<div class="autoline">New materials get their own daily usage box in Production, plus Purchases, Stocks, Costing and reorder warnings - automatically.</div>'
    +'<div class="scroll" style="margin-top:14px"><table><tr><th>Material</th><th>Unit</th><th>Usage</th><th></th></tr>'+matRows+'</table></div>'
    +'</div>';
}

function setupScreen(){
  var s = D.settings;
  var rawRows = D.opening.raw.map(function(o,i){
    return '<tr><td>'+esc(o.material)+'</td><td class="num">'+fmt2(o.qty)+'</td><td class="num">'+fmt2(o.cost)+'</td>'
      +'<td class="num">'+fmt(o.qty*o.cost)+'</td><td><button class="mini" onclick="delOpenRaw('+i+')">delete</button></td></tr>';
  }).join('');
  var finRows = D.opening.finished.map(function(o,i){
    return '<tr><td>'+esc(o.product)+'</td><td class="num">'+fmt(o.pcs)+'</td><td class="num">'+fmt2(o.costPc)+'</td>'
      +'<td class="num">'+fmt(o.pcs*o.costPc)+'</td><td><button class="mini" onclick="delOpenFin('+i+')">delete</button></td></tr>';
  }).join('');
  return '<div class="card"><h2>Opening stock (enter once when starting)</h2>'
    +'<p style="font-size:13px;color:var(--muted);margin-bottom:10px">Opening stock feeds stocks and avg costs WITHOUT appearing on the BLINE statement or distorting costing.</p>'
    +'<form class="grid" onsubmit="return addOpenRaw(event)">'
    +'<div><label>Raw material</label><select id="or_mat">'+D.materials.map(function(m){return '<option>'+esc(m.name)+'</option>';}).join('')+'</select></div>'
    +'<div><label>Qty</label><input type="number" step="any" id="or_qty" required></div>'
    +'<div><label>Unit cost (Rs)</label><input type="number" step="any" id="or_cost" required></div>'
    +'<div><button class="btn">Add raw opening</button></div></form>'
    +(rawRows?'<div class="scroll" style="margin-top:10px"><table><tr><th>Material</th><th class="num">Qty</th><th class="num">Cost</th><th class="num">Value</th><th></th></tr>'+rawRows+'</table></div>':'')
    +'<hr style="border:none;border-top:1px solid var(--line);margin:16px 0">'
    +'<form class="grid" onsubmit="return addOpenFin(event)">'
    +'<div><label>Finished product</label><select id="of_prod">'+D.products.map(function(p){return '<option>'+esc(p)+'</option>';}).join('')+'</select></div>'
    +'<div><label>Pcs</label><input type="number" step="any" id="of_pcs" required></div>'
    +'<div><label>Cost per pc (Rs)</label><input type="number" step="any" id="of_cost" required></div>'
    +'<div><button class="btn">Add finished opening</button></div></form>'
    +(finRows?'<div class="scroll" style="margin-top:10px"><table><tr><th>Product</th><th class="num">Pcs</th><th class="num">Cost/pc</th><th class="num">Value</th><th></th></tr>'+finRows+'</table></div>':'')
    +'<hr style="border:none;border-top:1px solid var(--line);margin:16px 0">'
    +'<form class="grid" onsubmit="return saveSettings(event)">'
    +'<div><label>Opening BLINE balance (Rs)</label><input type="number" step="any" id="st_bline" value="'+N(D.opening.bline)+'"></div>'
    +'<div><label>Gloves per poly bag</label><input type="number" step="any" id="st_poly" value="'+s.poly+'"></div>'
    +'<div><label>Gloves per pora bag</label><input type="number" step="any" id="st_pora" value="'+s.pora+'"></div>'
    +'<div><label>Reorder lead time (days)</label><input type="number" step="any" id="st_lead" value="'+s.lead+'"></div>'
    +'<div><label>Target margin %</label><input type="number" step="any" id="st_margin" value="'+(s.margin*100)+'"></div>'
    +'<div><button class="btn">Save settings</button></div></form>'
    +'<div class="autoline">Opening BLINE balance: positive = BLINE owes factory, negative = factory owes BLINE. Opening cash goes in the Cash Book (category: Opening).</div>'
    +'</div>'
    +'<div class="card"><h2>Backup</h2>'
    +'<p style="font-size:13px;color:var(--muted);margin-bottom:10px">Data lives in this browser on this device. Export a backup file weekly.</p>'
    +'<button class="btn" onclick="exportData()">Export backup</button> '
    +'<button class="btn grey" onclick="importClick()">Import backup</button>'
    +'<input type="file" id="importfile" accept=".json" style="display:none" onchange="importData(event)">'
    +' <button class="btn grey" onclick="resetData()">Reset all data</button>'
    +'</div>';
}

/* ---------- render ---------- */
function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(function(t){
    return '<button class="'+(t[0]===currentTab?'active':'')+'" onclick="go(&quot;'+t[0]+'&quot;)">'+t[1]+'</button>';
  }).join('');
}
function go(tab){ currentTab = tab; renderNav(); render(); }
function render(){
  var R = { dashboard:dashboardScreen, production:productionScreen, purchases:purchasesScreen,
            sales:salesScreen, cash:cashScreen, statement:statementScreen, costing:costingScreen,
            stocks:stocksScreen, capital:capitalScreen, items:itemsScreen, setup:setupScreen };
  try{
    document.getElementById('main').innerHTML = R[currentTab]();
  }catch(e){
    document.getElementById('main').innerHTML = '<div class="card" style="color:var(--red)">Something went wrong: '+esc(e.message)+'. Go to Setup &amp; Backup, Export a backup, then reload the page.</div>';
  }
}

/* ---------- form handlers ---------- */
function val(id){ return document.getElementById(id).value; }
function num(id){ return N(document.getElementById(id).value); }
function nid(){ return D.nextId++; }

function addProduction(e){ e.preventDefault();
  var use = {};
  inputMats().forEach(function(m,i){ var q = num('mu_'+i); if(q) use[m.name] = q; });
  D.production.push({id:nid(), date:val('pl_date'), product:val('pl_product'), pcs:num('pl_pcs'), use:use, note:val('pl_note')});
  D.production.sort(function(a,b){return a.date<b.date?-1:1;});
  save(); render(); return false; }
function addPurchase(e){ e.preventDefault();
  D.purchases.push({id:nid(), date:val('pu_date'), material:val('pu_mat'), qty:num('pu_qty'), price:num('pu_price'), note:val('pu_note')});
  D.purchases.sort(function(a,b){return a.date<b.date?-1:1;});
  save(); render(); return false; }
function addSale(e){ e.preventDefault();
  D.sales.push({id:nid(), date:val('sa_date'), product:val('sa_product'), pcs:num('sa_pcs'), price:num('sa_price'), note:val('sa_note')});
  D.sales.sort(function(a,b){return a.date<b.date?-1:1;});
  save(); render(); return false; }
function addCash(e){ e.preventDefault();
  D.cash.push({id:nid(), date:val('cb_date'), desc:val('cb_desc'), cat:val('cb_cat'), inn:num('cb_in'), out:num('cb_out')});
  D.cash.sort(function(a,b){return a.date<b.date?-1:1;});
  save(); render(); return false; }
function addOpenRaw(e){ e.preventDefault();
  D.opening.raw.push({material:val('or_mat'), qty:num('or_qty'), cost:num('or_cost')});
  save(); render(); return false; }
function addOpenFin(e){ e.preventDefault();
  D.opening.finished.push({product:val('of_prod'), pcs:num('of_pcs'), costPc:num('of_cost')});
  save(); render(); return false; }
function saveSettings(e){ e.preventDefault();
  D.opening.bline = num('st_bline');
  D.settings.poly = num('st_poly')||12;
  D.settings.pora = num('st_pora')||600;
  D.settings.lead = num('st_lead')||14;
  D.settings.margin = (num('st_margin')||25)/100;
  save(); render(); return false; }

/* products & materials modules */
function addProductName(e){ e.preventDefault();
  var name = val('np_name').trim();
  if(!name) return false;
  if(D.products.indexOf(name)>=0){ alert('That product already exists.'); return false; }
  D.products.push(name);
  save(); render(); return false; }
function delProductName(i){
  var name = D.products[i];
  var used = D.production.some(function(r){return r.product===name;})
          || D.sales.some(function(r){return r.product===name;})
          || D.opening.finished.some(function(o){return o.product===name;});
  if(used){ alert('Cannot delete "'+name+'" - it has entries. Delete those first.'); return; }
  if(D.products.length<=1){ alert('Keep at least one product.'); return; }
  if(confirm('Delete product "'+name+'"?')){ D.products.splice(i,1); save(); render(); } }
function addMaterial(e){ e.preventDefault();
  var name = val('nm_name').trim();
  if(!name) return false;
  if(D.materials.some(function(m){return m.name.toLowerCase()===name.toLowerCase();})){ alert('That material already exists.'); return false; }
  D.materials.push({name:name, unit:val('nm_unit')});
  save(); render(); return false; }
function delMaterial(i){
  var m = D.materials[i];
  var used = D.purchases.some(function(p){return p.material===m.name;})
          || D.opening.raw.some(function(o){return o.material===m.name;})
          || D.production.some(function(r){return r.use && N(r.use[m.name])>0;});
  if(m.auto){ alert('"'+m.name+'" is a system bag material and cannot be deleted.'); return; }
  if(used){ alert('Cannot delete "'+m.name+'" - it has entries. Delete those first.'); return; }
  if(confirm('Delete material "'+m.name+'"?')){ D.materials.splice(i,1); save(); render(); } }

function delById(arr,id){ var i=arr.findIndex(function(r){return r.id===id;}); if(i>=0 && confirm('Delete this entry?')){ arr.splice(i,1); save(); render(); } }
function delProduction(id){ delById(D.production,id); }
function delPurchase(id){ delById(D.purchases,id); }
function delSale(id){ delById(D.sales,id); }
function delCash(id){ delById(D.cash,id); }
function delOpenRaw(i){ if(confirm('Delete?')){ D.opening.raw.splice(i,1); save(); render(); } }
function delOpenFin(i){ if(confirm('Delete?')){ D.opening.finished.splice(i,1); save(); render(); } }

/* ---------- backup ---------- */
function exportData(){
  var blob = new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'factory_backup_'+today()+'.json';
  a.click();
}
function importClick(){ document.getElementById('importfile').click(); }
function importData(e){
  var f = e.target.files[0]; if(!f) return;
  var rd = new FileReader();
  rd.onload = function(){
    try{
      var d = JSON.parse(rd.result);
      if(!d || !d.materials) throw new Error('Not a valid backup file');
      D = d; save(); go('dashboard');
      alert('Backup restored.');
    }catch(err){ alert('Could not read that file: '+err.message); }
  };
  rd.readAsText(f);
}
function resetData(){
  if(confirm('This erases ALL data in this browser. Export a backup first. Continue?')
     && confirm('Are you sure? This cannot be undone.')){
    D = freshData(); save(); go('dashboard');
  }
}

/* ---------- boot ---------- */
load();
renderNav();
render();
</script>
